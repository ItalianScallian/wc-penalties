<title>World Cup penalties — kick by kick</title>
<style>
  :root {
    /* V5 sports-annual ledger palette (light) */
    --bg: #f2ecdd;
    --ink: #1d2f4e;
    --sub: #4a5670;
    --muted: #7a7663;
    --rule: #d9d2bd;
    --miss: #c94f2e;
    --tip-bg: #1d2f4e;
    --tip-ink: #f2ecdd;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#101312; --ink:#e9ece8; --sub:#b6bcb6; --muted:#7d857e; --rule:#232725; --miss:#e05d4b; --tip-bg:#e9ece8; --tip-ink:#101312; }
  }
  :root[data-theme="dark"]  { --bg:#101312; --ink:#e9ece8; --sub:#b6bcb6; --muted:#7d857e; --rule:#232725; --miss:#e05d4b; --tip-bg:#e9ece8; --tip-ink:#101312; }
  :root[data-theme="light"] { --bg:#f2ecdd; --ink:#1d2f4e; --sub:#4a5670; --muted:#7a7663; --rule:#d9d2bd; --miss:#c94f2e; --tip-bg:#1d2f4e; --tip-ink:#f2ecdd; }

  body {
    margin: 0; padding: 48px 24px 72px;
    background: var(--bg); color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; justify-content: center;
  }
  .wrap { width: min(1280px, 100%); }
  h1 { font-size: clamp(28px, 4vw, 44px); font-weight: 800; margin: 0 0 8px; text-wrap: balance; }
  .lede { color: var(--sub); font-size: 17px; margin: 0 0 40px; text-wrap: pretty; }
  .lede .k-goal, .lede .k-miss { display: inline-block; vertical-align: -2px; }

  /* one shared grid: each position is a single row spanning both columns,
     so in-game and shootout blocks align vertically at every position */
  .cols { display: grid; grid-template-columns: 1fr 1fr; column-gap: 56px; row-gap: 30px; align-items: start; }
  @media (max-width: 860px) { .cols { grid-template-columns: 1fr; row-gap: 24px; } .cols > * { grid-column: 1 !important; grid-row: auto !important; } }

  .col-head {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 24px;
  }
  .col-head h2 { font-size: 17px; font-weight: 800; margin: 0; }
  .col-head .tot { color: var(--muted); font-size: 14px; font-variant-numeric: tabular-nums; }

  .pos { margin-bottom: 0; }
  .pos-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .pos-head .name { font-size: 20px; font-weight: 800; }
  .pos-head .rate { font-variant-numeric: tabular-nums; }
  .pos-head .rate b { font-size: 26px; font-weight: 800; }
  .pos-head .rate .n { color: var(--muted); font-size: 15px; margin-left: 8px; }
  .pos-head .rate.worst b { color: var(--miss); }

  .kicks { display: flex; flex-wrap: wrap; gap: 8px; }
  .kick {
    position: relative; width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: default;
  }
  .kick:focus-visible { outline: 2px solid var(--sub); outline-offset: 2px; border-radius: 50%; }
  .k-goal, .k-ball { width: 17px; height: 17px; display: block; }
  .k-miss { width: 15px; height: 15px; position: relative; }
  .k-miss .k-ball { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); opacity: .22; }
  .k-miss::before, .k-miss::after {
    content: ""; position: absolute; left: 50%; top: 50%;
    width: 17px; height: 3px; background: var(--miss); border-radius: 2px;
  }
  .k-miss::before { transform: translate(-50%,-50%) rotate(45deg); }
  .k-miss::after  { transform: translate(-50%,-50%) rotate(-45deg); }
  .kick:hover .k-goal, .kick:focus-visible .k-goal { outline: 3px solid var(--sub); outline-offset: 1px; border-radius: 50%; }

  .kick .tip {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: var(--tip-bg); color: var(--tip-ink);
    font-size: 13px; font-weight: 600; white-space: nowrap;
    padding: 6px 10px; border-radius: 4px;
    pointer-events: none; opacity: 0; transition: opacity 120ms ease-out;
    z-index: 10;
  }
  .kick:hover .tip, .kick:focus-visible .tip { opacity: 1; }

  .foot { border-top: 1px solid var(--rule); margin-top: 32px; padding-top: 16px; color: var(--muted); font-size: 13px; text-wrap: pretty; }
  .foot .kick { vertical-align: -3px; }
</style>

const ORDER = ['ST','W','CM','FB','CB'];
const LABELS = { ST:'Strikers', W:'Wingers', CM:'Midfielders', FB:'Full-backs', CB:'Centre-backs' };
// CTX headline numbers are DERIVED from window.KICKS at runtime so data and
// totals can never desync: every [goals,attempts] is computed by counting kicks.
const CTX_META = [
  { key:'ig', title:'In open play', word:'in-game penalty' },
  { key:'so', title:'In shootouts', word:'shootout kick' },
];
const CTX = CTX_META.map(meta => {
  const rows = {};
  let tg = 0, ta = 0;
  ORDER.forEach(p => {
    const kicks = (window.KICKS || []).filter(k => k.ctx === meta.key && k.bucket === p);
    const g = kicks.reduce((s, k) => s + k.goal, 0);
    const a = kicks.length;
    rows[p] = [g, a];
    tg += g; ta += a;
  });
  return { ...meta, tot: [tg, ta], rows };
});
const WORST = { so:'CB' };

const cols = document.getElementById('cols');
// headers: one per column, same grid row
CTX.forEach((ctx, ci) => {
  const pct = (ctx.tot[0]/ctx.tot[1]*100).toFixed(0);
  const head = document.createElement('div');
  head.className = 'col-head';
  head.style.gridColumn = String(ci+1);
  head.style.gridRow = '1';
  head.innerHTML = `<h2>${ctx.title.toUpperCase()}</h2>
    <span class="tot">${ctx.tot[0]}/${ctx.tot[1]} scored · ${pct}%</span>`;
  cols.appendChild(head);
});
// position blocks: each position occupies one shared grid row across both columns
ORDER.forEach((p, ri) => {
  CTX.forEach((ctx, ci) => {
    const [g,a] = ctx.rows[p];
    const v = (g/a*100).toFixed(0);
    const pos = document.createElement('div');
    pos.className = 'pos';
    pos.style.gridColumn = String(ci+1);
    pos.style.gridRow = String(ri+2);
    const worst = WORST[ctx.key] === p ? ' worst' : '';
    pos.innerHTML = `<div class="pos-head"><span class="name">${LABELS[p]}</span>
      <span class="rate${worst}"><b>${v}%</b><span class="n">${g}/${a}</span></span></div>`;
    const grid = document.createElement('div');
    grid.className = 'kicks';
    // kicks are sorted scored-first to match dot order (goals then misses),
    // then year asc, then minute asc (when may be null on shootout rows)
    const kicksData = (window.KICKS || [])
      .filter(k => k.ctx === ctx.key && k.bucket === p)
      .sort((x, y) =>
        (y.goal - x.goal) ||
        (x.year - y.year) ||
        ((x.when ?? Infinity) - (y.when ?? Infinity)));
    for (let k = 0; k < a; k++) {
      const ok = k < g;
      const kick = document.createElement('span');
      kick.className = 'kick';
      kick.tabIndex = 0;
      const d = kicksData.length === a ? kicksData[k] : null;
      // shootout `when` is a raw event second, never display it; only show the minute in open play
      const showMin = d && d.ctx === 'ig' && d.when != null;
      const label = d
        ? `${d.goal ? 'Scored' : 'Missed'} — ${d.name} (${d.team} v ${d.opp}, ${d.year}${showMin ? ', ' + d.when + '′' : ''})`
        : `${ok ? 'Scored' : 'Missed'} — ${LABELS[p]} ${ctx.word} ${k+1} of ${a}`;
      kick.setAttribute('aria-label', label);
      const ballSvg = '<svg class="k-ball"><use href="#ball"/></svg>';
      kick.innerHTML = ok
        ? `<span class="k-goal">${ballSvg}</span><span class="tip">${label}</span>`
        : `<span class="k-miss">${ballSvg}</span><span class="tip">${label}</span>`;
      grid.appendChild(kick);
    }
    pos.appendChild(grid);
    cols.appendChild(pos);
  });
});
